version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      undici:
        patterns:
          - "undici"
          - "undici-types"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "25.x"
          - "26.x"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
