name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --verbose

      - name: Create or update release PR
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          commit: "chore: release"
          title: "chore: release"
          version: npm run changeset -- version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    needs: changelog
    if: needs.changelog.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --verbose

      - name: Build a production release
        run: npm run build

      - name: Gather version
        id: version
        run: |
          VERSION="v$(node -p 'require("./package.json").version')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$(echo "$VERSION" | cut -d. -f1)" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "$VERSION" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"
          echo "$VERSION"

      - name: Create release branch with built artifacts
        id: release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/$VERSION"
          git rm -rf .
          git checkout HEAD -- LICENSE
          git checkout HEAD -- README.md
          git checkout HEAD -- action.yml
          git checkout HEAD -- cli/
          git add --force dist/
          git commit -m "chore: release"
          git push origin "release/$VERSION"
          SHA=$(git rev-parse HEAD)
          git tag -f "$MAJOR" "$SHA"
          git tag -f "$MINOR" "$SHA"
          git push -f origin "$MAJOR" "$MINOR"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MAJOR: ${{ steps.version.outputs.major }}
          MINOR: ${{ steps.version.outputs.minor }}

      - name: Create a GitHub release
        run: gh release create "$VERSION" --target "$SHA" --generate-notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.release.outputs.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
